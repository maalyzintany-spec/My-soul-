# My-soul-
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>To My Man ❤️</title>
<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background: radial-gradient(circle,#1a1a2e,#0f0f1b);
overflow:hidden;
font-family: 'Arial';
color:white;
text-align:center;
}

/* HEART */
.heart {
width:100px;
height:100px;
background:red;
position:absolute;
top:20%;
transform:rotate(-45deg);
animation:beat 1s infinite;
}
.heart:before,
.heart:after{
content:"";
width:100px;
height:100px;
background:red;
border-radius:50%;
position:absolute;
}
.heart:before{top:-50px;left:0;}
.heart:after{left:50px;top:0;}

@keyframes beat{
0%{transform:scale(1) rotate(-45deg);}
50%{transform:scale(1.2) rotate(-45deg);}
100%{transform:scale(1) rotate(-45deg);}
}

/* COUNTDOWN */
#countdown{
font-size:80px;
font-weight:bold;
}

/* HIDDEN CONTENT */
#content{
display:none;
animation:fadeIn 2s ease-in;
}

@keyframes fadeIn{
from{opacity:0;}
to{opacity:1;}
}

/* CAKE */
.cake{
margin-top:20px;
font-size:80px;
}

/* MESSAGE */
.message{
font-size:22px;
margin-top:20px;
line-height:1.6;
}
</style>
</head>

<body>

<!-- MUSIC -->
<iframe width="0" height="0"
src="https://www.youtube.com/embed/9q4z6g2z2p0?autoplay=1&loop=1"
allow="autoplay"></iframe>

<div class="heart"></div>

<div id="countdown">10</div>

<div id="content">
<div class="cake">🎂🎂🎂</div>
<div id="candles">🕯️🕯️🕯️</div>

<h1>For Mohamed ❤️</h1>

<div class="message">
I didn’t plan to fall for you…<br>
but I did.<br><br>

And if I had to choose again,<br>
I would still choose you. 🤍<br><br>

You are my calm in every chaos.
</div>
</div>

<script>
// COUNTDOWN
let num = 10;
let cd = document.getElementById("countdown");

let timer = setInterval(()=>{
num--;
cd.textContent = num;

if(num === 0){
clearInterval(timer);
cd.style.display="none";
document.getElementById("content").style.display="block";
}
},1000);
</script>

</body>
</html>
